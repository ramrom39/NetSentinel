server:
  port: 8080

spring:
  application:
    name: netsentinel

  # H2 In-Memory Database (sin instalaciones, todo en RAM)
  datasource:
    url: jdbc:h2:mem:netsentinel;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console  # Accede desde: http://localhost:8080/h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop  # Crea tablas al iniciar, las borra al apagar
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: "NetSentinelSuperSecretKeyForJwtTokensThatIsAtLeast256BitsLong12345678"
    expiration-ms: 86400000 # 24 horas

logging:
  level:
    com.netsentinel: DEBUG

# Swagger UI: http://localhost:8080/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true   # Habilita el botón "Try it out" en todos los endpoints
  api-docs:
    path: /v3/api-docs
