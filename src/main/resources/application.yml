server:
  port: 8080

spring:
  application:
    name: netsentinel
  datasource:
    url: jdbc:postgresql://localhost:5432/netsentinel
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    # 256-bit plain text o base64 para firma (usaremos una por defecto para la demo)
    secret: "NetSentinelSuperSecretKeyForJwtTokensThatIsAtLeast256BitsLong12345678"
    expiration-ms: 86400000 # 24 horas

logging:
  level:
    com.netsentinel: DEBUG
